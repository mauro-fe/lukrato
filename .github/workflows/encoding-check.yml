name: Encoding Check

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  encoding:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check UTF-8 / mojibake
        run: npm run check:encoding
